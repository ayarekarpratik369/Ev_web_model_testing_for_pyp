<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Fault Predictor</title>
    <!-- <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"> -->
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f5f5f3;
            --card: #ffffff;
            --border: #e2e2de;
            --text: #1a1a1a;
            --muted: #888884;
            --accent: #2563eb;
            --accent-light: #eff4ff;
            --danger: #dc2626;
            --danger-light: #fef2f2;
            --success: #16a34a;
            --success-light: #f0fdf4;
            --warn: #d97706;
            --warn-light: #fffbeb;
            --radius: 10px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 16px 60px;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        .badge {
            display: inline-block;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.08em;
            color: var(--muted);
            background: var(--border);
            padding: 3px 10px;
            border-radius: 20px;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        h1 {
            font-size: 26px;
            font-weight: 500;
            letter-spacing: -0.02em;
            color: var(--text);
        }

        h1 span {
            color: var(--accent);
        }

        .subtitle {
            margin-top: 6px;
            font-size: 14px;
            color: var(--muted);
            font-weight: 300;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
            width: 100%;
            max-width: 480px;
        }

        .section-label {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .field label {
            font-size: 11px;
            color: var(--muted);
            font-weight: 400;
        }

        .field input {
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--text);
            outline: none;
            transition: border-color 0.15s;
            width: 100%;
        }

        .field input:focus {
            border-color: var(--accent);
            background: var(--accent-light);
        }

        .field input::placeholder {
            color: #ccc;
            font-size: 11px;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 20px 0;
        }

        button[type="submit"] {
            width: 100%;
            padding: 11px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 7px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button[type="submit"]:hover { opacity: 0.88; }
        button[type="submit"]:active { transform: scale(0.99); }
        button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

        .spinner {
            width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Result box */
        #result {
            margin-top: 16px;
            border-radius: 8px;
            overflow: hidden;
            display: none;
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

        .result-inner {
            padding: 16px 18px;
            display: flex;
            align-items: flex-start;
            gap: 14px;
        }

        .result-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            margin-top: 5px;
            flex-shrink: 0;
        }

        

        .result-label {
            font-size: 11px;
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .result-fault {
            font-size: 17px;
            font-weight: 500;
            letter-spacing: -0.01em;
        }

        .result-meta {
            font-size: 12px;
            margin-top: 4px;
            opacity: 0.7;
        }

        /* color themes for result */
        .res-normal  { background: var(--success-light); color: var(--success); border: 1px solid #bbf7d0; }
        .res-fault   { background: var(--danger-light);  color: var(--danger);  border: 1px solid #fecaca; }
        .res-warn    { background: var(--warn-light);    color: var(--warn);    border: 1px solid #fde68a; }

        footer {
            margin-top: 28px;
            font-size: 12px;
            color: var(--muted);
            text-align: center;
        }

        footer a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>

<header>
    
    <h1>EV Fault <span>Predictor</span></h1>
    <p class="subtitle">Random Forest · Top 10 Features · 96.5% Accuracy</p>
</header>

<div class="card">
    <div class="section-label">Sensor Inputs</div>

    <form id="predictForm">
        <div class="grid">
            <div class="field">
                <label>Battery Temp (°C)</label>
                <input type="number" step="any" name="f1" placeholder="0 – 120" required>
            </div>
            <div class="field">
                <label>Cell Voltage Delta</label>
                <input type="number" step="any" name="f2" placeholder="e.g. 0.05" required>
            </div>
            <div class="field">
                <label>Motor Temp (°C)</label>
                <input type="number" step="any" name="f3" placeholder="16 – 160" required>
            </div>
            <div class="field">
                <label>Temp Delta Bat/Amb</label>
                <input type="number" step="any" name="f4" placeholder="e.g. 12.4" required>
            </div>
            <div class="field">
                <label>Cell Min Voltage (V)</label>
                <input type="number" step="any" name="f5" placeholder="0 – 5" required>
            </div>
            <div class="field">
                <label>Thermal Runaway Index</label>
                <input type="number" step="any" name="f6" placeholder="e.g. 0.32" required>
            </div>
            <div class="field">
                <label>Vibration (g)</label>
                <input type="number" step="any" name="f7" placeholder="e.g. 0.3" required>
            </div>
            <div class="field">
                <label>Smoke (ppm)</label>
                <input type="number" step="any" name="f8" placeholder="0 – 500" required>
            </div>
            <div class="field">
                <label>Coolant Flow (L/min)</label>
                <input type="number" step="any" name="f9" placeholder="0 – 15" required>
            </div>
            <div class="field">
                <label>Coolant Temp (°C)</label>
                <input type="number" step="any" name="f10" placeholder="e.g. 40" required>
            </div>
        </div>

        <div class="divider"></div>

        <button type="submit" id="submitBtn">
            <span class="spinner" id="spinner"></span>
            <span id="btnText">Run Prediction</span>
        </button>
    </form>

    <div id="result"></div>
</div>

<footer>
    Built by <a href="https://github.com/ayarekarpratik369">Pratik Ayarekar (first version)</a> · EV Fault Detection using ML ·
    <a href="https://github.com/ayarekarpratik369/ML_EV_predictor" target="_blank">GitHub</a>
</footer>

<script>
    const FAULT_COLORS = {
        "Normal":                "res-normal",
        "Battery_Overheat":      "res-fault",
        "Battery_Undervoltage":  "res-warn",
        "Motor_Overload":        "res-fault",
        "Coolant_Failure":       "res-warn",
        "Fire_Risk":             "res-fault",
        "Cell_Imbalance":        "res-warn",
    };

    const DOT_COLORS = {
        "res-normal": "#16a34a",
        "res-fault":  "#dc2626",
        "res-warn":   "#d97706",
    };

    document.getElementById("predictForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const btn     = document.getElementById("submitBtn");
        const spinner = document.getElementById("spinner");
        const btnText = document.getElementById("btnText");
        const result  = document.getElementById("result");

        // Loading state
        btn.disabled      = true;
        spinner.style.display = "block";
        btnText.textContent   = "Predicting…";
        result.style.display  = "none";

        const formData = new FormData(e.target);

        try {
            const res  = await fetch("/predict", { method: "POST", body: formData });
            const data = await res.json();   // expects { fault, label } from FastAPI

            const fault      = data.fault  ?? "Unknown";
            const label      = data.label  ?? "—";
            const colorClass = FAULT_COLORS[fault] ?? "res-warn";
            const dotColor   = DOT_COLORS[colorClass];
            const isNormal   = fault === "Normal";

            result.innerHTML = `
                <div class="result-inner ${colorClass}">
                    <div class="result-dot" style="background:${dotColor}"></div>
                    <div class="result-content">
                        <div class="result-label">${isNormal ? "Status" : "Fault Detected"}</div>
                        <div class="result-fault">${fault.replace(/_/g, ' ')}</div>
                        <div class="result-meta">Label ${label}</div>
                    </div>
                </div>`;
            result.style.display = "block";

        } catch (err) {
            result.innerHTML = `
                <div class="result-inner res-fault">
                    <div class="result-dot" style="background:#dc2626"></div>
                    <div class="result-content">
                        <div class="result-label">Error</div>
                        <div class="result-fault">Could not reach server</div>
                        <div class="result-meta">${err.message}</div>
                    </div>
                </div>`;
            result.style.display = "block";
        } finally {
            btn.disabled          = false;
            spinner.style.display = "none";
            btnText.textContent   = "Run Prediction";
        }
    });
</script>

</body>
</html>
